function buildGMapsURL(fromStation, toStation) {
  const clean = (s) => s.replace(/\s*[A-Z]\d+.*$/g, "").replace(/\s*[YSMNEGHTZCI]\d+/g, "").trim();
  const from = clean(fromStation);
  const to = clean(toStation);
  const addEki = (s) => {
    if (/駅|空港|機場|station|airport/i.test(s)) return s;
    if (/成田/.test(s)) return s + "空港";
    return s + "駅";
  };
  const origin = encodeURIComponent(addEki(from) + " 東京");
  const dest = encodeURIComponent(addEki(to) + " 東京");
  return "https://www.google.com/maps/dir/?api=1&origin=" + origin + "&destination=" + dest + "&travelmode=transit";
}

function RouteStep({ step, isLast }) {
  var mapsUrl = buildGMapsURL(step.from, step.to);
  return (
    <div style={{ display: "flex", gap: 12, alignItems: "stretch", minHeight: 60 }}>
      <div style={{ display: "flex", flexDirection: "column", alignItems: "center", width: 28, flexShrink: 0 }}>
        <div style={{
          width: 14, height: 14, borderRadius: "50%", backgroundColor: step.lineColor,
          border: "2.5px solid #fff", boxShadow: "0 0 0 1.5px " + step.lineColor + "40", flexShrink: 0, marginTop: 4
        }} />
        {!isLast && (
          <div style={{
            flex: 1, width: 3, borderRadius: 2,
            background: "linear-gradient(to bottom, " + step.lineColor + ", " + step.lineColor + "30)",
            marginTop: 2, marginBottom: 2, minHeight: 20
          }} />
        )}
      </div>
      <div style={{ flex: 1, paddingBottom: isLast ? 0 : 14 }}>
        <div style={{ display: "flex", alignItems: "center", gap: 6, flexWrap: "wrap" }}>
          <span style={{ fontWeight: 700, fontSize: 14, color: "#1a1a2e" }}>{step.from}</span>
          <span style={{ color: "#64748b", fontSize: 12 }}>→</span>
          <span style={{ fontWeight: 700, fontSize: 14, color: "#1a1a2e" }}>{step.to}</span>
          <span style={{
            fontSize: 11, fontWeight: 600, color: step.lineColor,
            background: step.lineColor + "15", padding: "1px 7px", borderRadius: 10
          }}>{step.time}</span>
        </div>
        <div style={{ fontSize: 12, color: "#64748b", marginTop: 2 }}>{step.line}</div>
        {step.note && (
          <div style={{
            fontSize: 11.5, color: "#3b82f6", marginTop: 3,
            background: "#eff6ff", padding: "3px 8px", borderRadius: 6,
            borderLeft: "2.5px solid #3b82f6", display: "inline-block"
          }}>
            {step.note}
          </div>
        )}
        <div style={{ marginTop: 5 }}>
          <a href={mapsUrl} target="_blank" rel="noopener noreferrer" className="gmaps-btn">
            <GMapsPin />
            Google Maps 導航
          </a>
        </div>
      </div>
    </div>
  );
}

function RouteCard({ route, initOpen }) {
  const [open, setOpen] = useState(initOpen !== undefined ? initOpen : true);
  const isSub = route.subway;
  return (
    <div className={isSub ? "subway-ticket-card" : ""} style={{
      background: isSub ? undefined : "#fff", borderRadius: 14, marginBottom: 10,
      border: isSub ? undefined : "1px solid #e2e8f0", overflow: "hidden",
      boxShadow: "0 1px 4px rgba(0,0,0,.06)"
    }}>
      <button onClick={() => setOpen(!open)} style={{
        width: "100%", display: "flex", alignItems: "center", justifyContent: "space-between",
        padding: "12px 16px", cursor: "pointer", border: "none", background: "transparent",
        textAlign: "left", gap: 8, fontFamily: "inherit"
      }}>
        <div style={{ flex: 1 }}>
          <div style={{ fontWeight: 700, fontSize: 13.5, color: isSub ? "#6d28d9" : "#1a1a2e" }}>
            {isSub && "🎫 "}{route.label}
          </div>
          <div style={{ display: "flex", gap: 8, marginTop: 4, flexWrap: "wrap", alignItems: "center" }}>
            <span style={{
              fontSize: 11, fontWeight: 600, color: "#fff",
              background: isSub ? "linear-gradient(90deg,#7c3aed,#a855f7)" : "#3b82f6",
              padding: "1px 8px", borderRadius: 10
            }}>{route.badge}</span>
            <span style={{ fontSize: 12, color: "#64748b", fontWeight: 600 }}>{route.cost}</span>
            {route.savings && <span className="subway-savings">💰 省 {route.savings}</span>}
          </div>
        </div>
        <span style={{
          fontSize: 18, color: "#64748b", transition: "transform .2s",
          transform: open ? "rotate(180deg)" : "rotate(0)"
        }}>▾</span>
      </button>
      {open && (
        <div style={{ padding: "0 16px 14px 16px" }}>
          {route.info && (
            <div style={{ fontSize: 12, color: "#6d28d9", background: "#ede9fe", borderRadius: 8, padding: "8px 10px", marginBottom: 10, lineHeight: 1.6 }}>
              {route.info}
            </div>
          )}
          {route.steps.map((s, i) => (
            <RouteStep key={i} step={s} isLast={i === route.steps.length - 1} />
          ))}
        </div>
      )}
    </div>
  );
}

  const [search, setSearch] = useState("");
  const grouped = {};
  AREA_ORDER.forEach(a => { grouped[a] = []; });
  spots.forEach(s => {
    if (!grouped[s.a]) grouped[s.a] = [];
    grouped[s.a].push(s);
  });
  const filtered = search.trim() ? spots.filter(s => s.n.toLowerCase().includes(search.toLowerCase())) : null;

  return (
    <div style={{ animation: "fadeSlide .35s ease" }}>
      <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 10 }}>
        <span style={{ fontSize: 28 }}>{icon}</span>
        <div>
          <div style={{ fontWeight: 800, fontSize: 18, color: "#1a1a2e", letterSpacing: -0.3 }}>{title}</div>
          <div style={{ fontSize: 12.5, color: "#64748b" }}>共 {spots.length} 個收藏・點擊導航</div>
        </div>
      </div>
      <input value={search} onChange={e => setSearch(e.target.value)}
        placeholder="🔍 搜尋店名..."
        style={{ width: "100%", padding: "10px 14px", borderRadius: 12, border: "1.5px solid #e2e8f0", fontSize: 14, fontFamily: "inherit", marginBottom: 12, background: "#fff", outline: "none" }}
      />
      {filtered ? (
        <div style={{ background: "#fff", borderRadius: 14, border: "1px solid #e2e8f0", overflow: "hidden" }}>
          {filtered.length === 0 && <div style={{ padding: 16, textAlign: "center", color: "#94a3b8", fontSize: 13 }}>找不到相關結果</div>}
          {filtered.map((s, i) => (
            <SpotItem key={i} spot={s} border={i < filtered.length - 1} />
          ))}
        </div>
      ) : (
        AREA_ORDER.map(area => {
          const items = grouped[area];
          if (!items || items.length === 0) return null;
          return <AreaSection key={area} area={area} items={items} />;
        })
      )}
    </div>
  );
}

function AreaSection({ area, items }) {
  const [open, setOpen] = useState(false);
  const dayTag = AREA_DAYS[area] || "";
  return (
    <div style={{ marginBottom: 8, borderRadius: 14, overflow: "hidden", border: "1px solid #e2e8f0", boxShadow: "0 1px 3px rgba(0,0,0,.04)" }}>
      <button onClick={() => setOpen(!open)} style={{
        width: "100%", display: "flex", alignItems: "center", justifyContent: "space-between",
        padding: "11px 14px", cursor: "pointer", border: "none", fontFamily: "inherit",
        background: open ? "#f8fafc" : "#fff", textAlign: "left", gap: 8
      }}>
        <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
          <span style={{ fontSize: 16 }}>{AREA_ICONS[area] || "📍"}</span>
          <span style={{ fontWeight: 700, fontSize: 13.5, color: "#1a1a2e" }}>{area}</span>
          <span style={{ fontSize: 11, color: "#94a3b8", fontWeight: 500 }}>({items.length})</span>
        </div>
        <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
          {dayTag && <span style={{ fontSize: 10, fontWeight: 600, background: "#eff6ff", color: "#3b82f6", padding: "1px 6px", borderRadius: 6 }}>{dayTag}</span>}
          <span style={{ fontSize: 16, color: "#94a3b8", transition: "transform .2s", transform: open ? "rotate(180deg)" : "rotate(0)" }}>▾</span>
        </div>
      </button>
      {open && (
        <div style={{ borderTop: "1px solid #f1f5f9" }}>
          {items.map((s, i) => <SpotItem key={i} spot={s} border={i < items.length - 1} />)}
        </div>
      )}
    </div>
  );
}

function SpotItem({ spot, border }) {
  return (
    <div style={{ display: "flex", alignItems: "center", padding: "9px 14px", borderBottom: border ? "1px solid #f1f5f9" : "none", gap: 8, background: "#fff" }}>
      <div style={{ flex: 1, minWidth: 0 }}>
        <div style={{ fontWeight: 600, fontSize: 13, color: "#1a1a2e", overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{spot.n}</div>
      </div>
      {spot.u && (
        <a href={spot.u} target="_blank" rel="noopener noreferrer" className="gmaps-icon-btn"
           style={{ width: 28, height: 28, borderRadius: 6, flexShrink: 0 }}>
          <GMapsPin />
        </a>
      )}
    </div>
  );
}

function App() {
  const [activeDay, setActiveDay] = useState(2);
  const [showRef, setShowRef] = useState(false);

  var tabs = [
    ...DAYS.map(function(d) { return { key: d.day, label: "D" + d.day, sub: d.date.slice(5, 10), color: d.color, icon: d.icon }; }),
    { key: "ref", label: "速查", sub: "路線", color: "#6b7280", icon: "🗺️" },
    { key: "food", label: "美食", sub: "95店", color: "#ef4444", icon: "🍜" },
    { key: "shop", label: "逛街", sub: "78店", color: "#f59e0b", icon: "🛍️" },
  ];

  return (
    <div style={{
      fontFamily: "'Noto Sans TC', 'Noto Sans JP', 'Helvetica Neue', sans-serif",
      background: "#f0f2f5", minHeight: "100vh", maxWidth: 520, margin: "0 auto",
    }}>
      {/* Header */}
      <div style={{
        background: "linear-gradient(135deg, #1e293b 0%, #334155 100%)",
        padding: "24px 20px 18px", color: "#fff"
      }}>
        <div style={{ fontSize: 11, fontWeight: 600, letterSpacing: 2, opacity: .6, marginBottom: 4 }}>TOKYO METRO GUIDE</div>
        <div style={{ fontSize: 22, fontWeight: 800, letterSpacing: -0.5 }}>🚇 東京自由行地鐵路線</div>
        <div style={{ fontSize: 12.5, opacity: .7, marginTop: 4 }}>
          📍 飯田橋 艾德蒙大都會大飯店 ｜ 04/14-04/19
        </div>
        <div style={{ marginTop: 10, display: "flex", gap: 6, flexWrap: "wrap" }}>
          {["有楽町線 Y13", "東西線 T06", "南北線 N10", "大江戸線 E06", "JR中央・総武線"].map(function(l, i) {
            return (
              <span key={i} style={{
                fontSize: 10, padding: "2px 8px", borderRadius: 10,
                background: "rgba(255,255,255,.15)", color: "rgba(255,255,255,.85)", fontWeight: 500
              }}>{l}</span>
            );
          })}
        </div>
      </div>

      {/* Tab Bar */}
      <div style={{
        display: "flex", overflowX: "auto", gap: 0,
        background: "#fff", borderBottom: "1px solid #e2e8f0",
        position: "sticky", top: 0, zIndex: 10,
        boxShadow: "0 2px 8px rgba(0,0,0,.04)"
      }}>
        {tabs.map(function(t) {
          var isActive = (t.key === "ref" || t.key === "food" || t.key === "shop") ? showRef === t.key : (!showRef && activeDay === t.key);
          return (
            <button
              key={t.key}
              onClick={function() {
                if (t.key === "ref" || t.key === "food" || t.key === "shop") { setShowRef(t.key); }
                else { setShowRef(false); setActiveDay(t.key); }
              }}
              style={{
                flex: "1 0 auto", minWidth: 52, padding: "10px 6px 8px",
                display: "flex", flexDirection: "column", alignItems: "center", gap: 1,
                border: "none", cursor: "pointer", fontFamily: "inherit",
                background: isActive ? t.color + "10" : "transparent",
                borderBottom: isActive ? "2.5px solid " + t.color : "2.5px solid transparent",
                transition: "all .15s"
              }}
            >
              <span style={{ fontSize: 16 }}>{t.icon}</span>
              <span style={{
                fontSize: 11, fontWeight: isActive ? 800 : 600,
                color: isActive ? t.color : "#64748b"
              }}>{t.label}</span>
              <span style={{ fontSize: 9, color: "#64748b", opacity: .7 }}>{t.sub}</span>
            </button>
          );
        })}
      </div>

      {/* Content */}
      <div style={{ padding: "16px 16px 40px" }}>
        {showRef === "ref" ? <QuickRef /> : showRef === "food" ? <SpotList spots={FOOD_SPOTS} title="東京美食收藏" icon="🍜" /> : showRef === "shop" ? <SpotList spots={SHOP_SPOTS} title="東京逛街收藏" icon="🛍️" /> : <DayPanel data={DAYS.find(function(d) { return d.day === activeDay; })} />}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
